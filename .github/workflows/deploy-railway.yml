name: Deploy Railway

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy-api:
    name: Deploy API Service
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && secrets.RAILWAY_TOKEN != '' && secrets.RAILWAY_PROJECT_ID != '' && secrets.RAILWAY_SERVICE_ID != ''
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Link Railway project
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway link --project ${{ secrets.RAILWAY_PROJECT_ID }} --service ${{ secrets.RAILWAY_SERVICE_ID }}

      - name: Deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --ci

      - name: Post-deploy health check
        if: secrets.RAILWAY_PUBLIC_API_URL != ''
        run: curl -fsS ${{ secrets.RAILWAY_PUBLIC_API_URL }}/health
